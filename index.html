<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوک‌کلاب | ورود / ثبت‌نام</title>
  <!-- فونت -->
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- فونت Awesome (برای آیکون‌ها) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- فایل استایل ۱ (فاطمه حسن‌پور) -->
  <link rel="stylesheet" href="style1.css" />
  <!-- فایل استایل ۲ (مریم بدخشان) -->
  <link rel="stylesheet" href="style2.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="logo"><span>بوک</span>‌کلاب</div>
    <ul class="nav-links">
      <li><a href="#" class="active">خانه</a></li>
      <li><a href="#">کتاب‌ها</a></li>
      <li><a href="#">اعضا</a></li>
      <li><a href="#">درباره</a></li>
    </ul>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">
    <div class="container">

      <!-- عنوان -->
      <div class="form-title">
        <h2>به <span>بوک‌کلاب</span> خوش آمدید</h2>
        <p>وارد شوید یا عضو شوید</p>
      </div>

      <!-- ===== TABS ===== -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">ورود</button>
        <button class="tab-btn" data-tab="register">ثبت‌نام</button>
      </div>

      <!-- ===== فرم ورود ===== -->
      <div id="login-form" class="form active">
        <div class="form-group">
          <label>ایمیل</label>
          <input type="email" id="login-email" placeholder="example@email.com" />
          <small class="error-msg" id="login-email-error"></small>
        </div>
        <div class="form-group">
          <label>رمز عبور</label>
          <input type="password" id="login-password" placeholder="••••••••" />
          <small class="error-msg" id="login-password-error"></small>
        </div>
        <div class="form-options">
          <label><input type="checkbox" /> مرا به خاطر بسپار</label>
          <a href="#">فراموش کردم</a>
        </div>
        <button class="btn-submit" id="login-btn">ورود</button>

        <div class="divider">یا</div>
        <div class="social-login">
          <a href="#"><i class="fab fa-google"></i></a>
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fab fa-telegram"></i></a>
        </div>
      </div>

      <!-- ===== فرم ثبت‌نام ===== -->
      <div id="register-form" class="form">
        <div class="form-group">
          <label>نام کامل</label>
          <input type="text" id="register-name" placeholder="نام و نام خانوادگی" />
          <small class="error-msg" id="register-name-error"></small>
        </div>
        <div class="form-group">
          <label>ایمیل</label>
          <input type="email" id="register-email" placeholder="example@email.com" />
          <small class="error-msg" id="register-email-error"></small>
        </div>
        <div class="form-group">
          <label>رمز عبور</label>
          <input type="password" id="register-password" placeholder="••••••••" />
          <small class="error-msg" id="register-password-error"></small>
        </div>
        <div class="form-group">
          <label>تکرار رمز عبور</label>
          <input type="password" id="register-password-confirm" placeholder="••••••••" />
          <small class="error-msg" id="register-password-confirm-error"></small>
        </div>
        <div class="form-options">
          <label><input type="checkbox" id="register-terms" /> با قوانین موافقم</label>
        </div>
        <button class="btn-submit" id="register-btn">ثبت‌نام</button>

        <div class="divider">یا</div>
        <div class="social-login">
          <a href="#"><i class="fab fa-google"></i></a>
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fab fa-telegram"></i></a>
        </div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div>© ۲۰۲۶ بوک‌کلاب — <a href="#">درباره ما</a></div>
    <div class="social">
      <i class="fab fa-instagram"></i>
      <i class="fab fa-telegram"></i>
      <i class="fab fa-twitter"></i>
    </div>
  </footer>

  <!-- فایل جاوااسکریپت (شیما مرادی) -->
  <script src="script.js"></script>

</body>
</html>
